<!DOCTYPE html>
<html lang="es" translate="no">
<head>
    <meta charset="utf-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Squaredle Español</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body translate="no">

<div class="app" translate="no">
    <div class="top-bar">
        <h1>Squaredle Español</h1>
        <button id="mute-btn">🔊</button>
    </div>

    <div class="meta-bar">
        <div id="player-info">Anónimo</div>
        <span class="meta-sep">•</span>
        <div id="progress" class="progress-container">
            <div class="progress-bar"></div>
            <div class="progress-text"></div>
        </div>
        <span class="meta-sep">•</span>
        <button id="leaderboard-btn">Tabla de Clasificación</button>
    </div>

    <div id="current-word" translate="no"></div>

    <div class="game-layout">
        <div class="left-panel">
            <div id="board" translate="no"></div>
        </div>
        <div class="right-panel">
            <div id="found-words" translate="no"></div>
        </div>
    </div>
</div>

<div id="username-modal" class="modal hidden">
    <div class="modal-card">
        <h2>¡Bienvenido!</h2>

        <p>
            Elige un nombre para aparecer en la clasificación.
        </p>

        <input
            id="username-input"
            type="text"
            maxlength="20"
            placeholder="Nombre de usuario"
            autocomplete="off"
        >

        <div id="username-error" class="modal-error"></div>

        <button id="username-submit">
            Continuar
        </button>
    </div>
</div>

<div id="definition-tooltip" translate="no"></div>

<div id="leaderboard-modal" class="modal hidden">
    <div class="modal-card">
        <div class="leaderboard-header">
            <div class="leaderboard-title">Leaderboard</div>
            <div id="leaderboard-date"></div>
        </div>
        <div id="leaderboard-list"></div>
        <button id="close-leaderboard">Cerrar</button>
    </div>
</div>

<script type="module" src="config.js"></script>
<script type="module" src="./js/app.js"></script>

</body>
</html>
