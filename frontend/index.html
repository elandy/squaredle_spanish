<!DOCTYPE html>
<html lang="es" translate="no">
<head>
    <meta charset="utf-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Squaredle Español</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body translate="no">

<div class="app" translate="no">
    <div class="top-bar">
        <img
            id="game-banner"
            src="/assets/banner4.png"
            alt="Squaredle Español"
            draggable="false"
        />
    </div>

    <div class="meta-bar">
        <div id="progress" class="progress-container">
            <div class="progress-bar"></div>
            <div class="progress-text"></div>
        </div>
        <span class="meta-sep">•</span>
        <button id="leaderboard-btn" title="Ranking / Estadísticas">🏆 📊</button>
        <span class="meta-sep">•</span>
        <button id="mute-btn">🔊</button>
    </div>
    <div class="player-info-container">
        <div id="player-info">Anónimo</div>
    </div>
    <div id="current-word" translate="no"></div>

    <div class="game-layout">
        <div class="left-panel">
            <div id="board" translate="no"></div>
        </div>
        <div class="right-panel">
            <div id="found-words" translate="no"></div>
        </div>
    </div>
</div>

<div id="username-modal" class="modal hidden">
    <div class="modal-card">
        <h2>¡Bienvenido!</h2>

        <p>
            Elige un nombre para aparecer en la clasificación.
        </p>

        <input
            id="username-input"
            type="text"
            maxlength="20"
            placeholder="Nombre de usuario"
            autocomplete="off"
        >

        <div id="username-error" class="modal-error"></div>

        <button id="username-submit">
            Continuar
        </button>
    </div>
</div>

<div id="definition-tooltip" translate="no"></div>

<div id="leaderboard-modal" class="modal hidden">
    <div class="modal-card">

        <div class="leaderboard-header">
            <div class="leaderboard-title">Ranking</div>
            <div id="leaderboard-date"></div>
        </div>

        <div class="leaderboard-tabs main-tabs">
            <button id="main-tab-ranking" class="active">
                🏆 Ranking
            </button>
            <button id="main-tab-stats">
                📊 Estadísticas
            </button>
        </div>

        <div id="ranking-view">
            <div class="leaderboard-controls">
                <div class="leaderboard-tabs">
                    <button id="tab-score" class="active">
                        Puntaje
                    </button>
                    <button id="tab-words">
                        Palabras
                    </button>
                </div>
                <label class="leaderboard-bonus-toggle">
                    <span>Incluir bonus</span>
                    <input id="leaderboard-bonus" type="checkbox">
                </label>
            </div>
            <div id="leaderboard-list"></div>
        </div>

        <div id="statistics-view" class="hidden">
            <div id="statistics-list"></div>
        </div>

        <button id="close-leaderboard">
            Cerrar
        </button>

    </div>
</div>

<div id="victory-modal" class="modal hidden">
    <div class="modal-card victory-card">
        <div class="victory-icon">
            🏆
        </div>

        <h2>¡Felicidades!</h2>

        <p>
            Encontraste todas las palabras.
            ¿Podrás encontrar también todas las palabras bonus?
        </p>

        <button id="close-victory">
            Cerrar
        </button>
    </div>
</div>

<script type="module" src="src/app.ts"></script>

</body>
</html>
